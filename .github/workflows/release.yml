name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  SKYLINE_ZIP_URL: "https://github.com/crackheadakira/skyline/releases/download/release/skyline_logging.zip"
  CARGO_SKYLINE_VERSION: "3.5.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-skyline
        run: cargo install cargo-skyline --version "${CARGO_SKYLINE_VERSION}" --locked

      - name: Read project metadata
        id: meta
        run: |
          CRATE=$(grep -m1 '^name' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          TITLE_ID=$(grep -m1 'titleid' Cargo.toml | sed -E 's/.*"([0-9A-Fa-f]+)".*/\1/')
          echo "crate=$CRATE"       >> "$GITHUB_OUTPUT"
          echo "title_id=$TITLE_ID" >> "$GITHUB_OUTPUT"
          echo "Crate: $CRATE | Title ID: $TITLE_ID"

      - name: Build & package both variants
        id: pack
        timeout-minutes: 30
        run: |
          set -euo pipefail
          CRATE="${{ steps.meta.outputs.crate }}"
          NRO="target/aarch64-skyline-switch/release/lib${CRATE}.nro"

          curl -fsSL -o skyline.zip "${SKYLINE_ZIP_URL}"

          ZIPS=()

          build_variant() {
            local suffix="$1"; shift
            local feature_args=("$@")
            local name="${CRATE}${suffix}"

            echo "::group::Building variant ${name} (cargo skyline build --release ${feature_args[*]})"
            python3 .github/skyline-build.py cargo skyline build --release "${feature_args[@]}"
            test -f "$NRO" || { echo "::error::Built NRO not found at $NRO"; exit 1; }

            local mod="dist/${name}"
            mkdir -p "$mod/exefs" "$mod/romfs/skyline/plugins"
            unzip -o -j skyline.zip "exefs/main.npdm" "exefs/subsdk9" -d "$mod/exefs"
            test -f "$mod/exefs/main.npdm"
            test -f "$mod/exefs/subsdk9"
            cp "$NRO" "$mod/romfs/skyline/plugins/lib${CRATE}.nro"

            local zip="${name}-${GITHUB_REF_NAME}.zip"
            ( cd dist && zip -r "../${zip}" "${name}" )
            ZIPS+=("$zip")
            echo "::endgroup::"
          }

          build_variant ""
          build_variant "-emulator"  --features no_forward

          echo "Build output:"
          find dist -type f

          { echo "zips<<EOF"; printf '%s\n' "${ZIPS[@]}"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.crate }}-mod
          path: ${{ steps.pack.outputs.zips }}

      - name: Generate changelog
        id: changelog
        if: startsWith(github.ref, 'refs/tags/')
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.zips }}
          body: ${{ steps.changelog.outputs.content }}
